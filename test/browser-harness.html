<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="latex-visual-editor-mathjax" content="/dist/mathjax/tex-svg.js">
  <link rel="stylesheet" href="/dist/webview.css">
  <title>LaTeX Visual Editor Harness</title>
</head>
<body>
  <div id="toolbar"></div>
  <div id="editor"></div>
  <script>
    const source = String.raw`\documentclass{article}
\usepackage{graphicx}
\title{Visual LaTeX Editor}
\author{VS Code}
\begin{document}
\maketitle
\section{Introduction}
This is \textbf{bold}, \textit{italic}, and inline math \(x^2 + y^2\).

\begin{itemize}
\item First item
\item Second item
\end{itemize}

\begin{table}
\centering
\begin{tabular}{lc}
Name & Value \\
Alpha & 1 \\
\end{tabular}
\caption{Example table}
\label{tab:example}
\end{table}
\end{document}`;
    const api = {
      postMessage(message) {
        if (message.type === 'ready') {
          window.postMessage({
            type: 'initialize',
            text: source,
            version: 1,
            documentUri: 'file:///browser-harness.tex',
            metadata: {
              labels: ['tab:example'],
              citationKeys: ['smith2026'],
              includes: [],
              graphics: [],
              packages: ['graphicx'],
              commands: [],
              environments: []
            },
            configuration: {
              assetsDirectory: 'assets',
              maxImagePreviewBytes: 20971520,
              syntaxValidation: true
            }
          }, '*');
        }
        window.__messages = [...(window.__messages || []), message];
      },
      getState() { return undefined; },
      setState() {}
    };
    window.acquireVsCodeApi = () => api;
  </script>
  <script src="/dist/webview.js"></script>
</body>
</html>
